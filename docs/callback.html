<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBooks - Autorización Exitosa</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2c3e50; }
        .code-box { background: #f4f4f4; padding: 15px; border-radius: 5px; word-break: break-all; margin: 10px 0; }
        .success { color: #27ae60; }
        .label { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h1 class="success">✅ Autorización Exitosa</h1>
    <p>Copia estos valores y pégalos en tu terminal:</p>
    
    <div class="label">Authorization Code:</div>
    <div class="code-box" id="code">Cargando...</div>
    
    <div class="label">Realm ID (Company ID):</div>
    <div class="code-box" id="realmId">Cargando...</div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const realmId = params.get('realmId');
        
        document.getElementById('code').textContent = code || 'No encontrado';
        document.getElementById('realmId').textContent = realmId || 'No encontrado';
    </script>
</body>
</html>
